  <!-- Lens highlights -->
  <path d="M 58,38 C 72,24 94,16 114,14" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 462,38 C 448,24 426,16 406,14" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-linecap="round"/>
